<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain Hunter — HugeDomains Scraper + WHOIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c14;
    --bg2: #12121e;
    --bg3: #1a1a2e;
    --surface: #22223a;
    --border: #2a2a48;
    --fg: #e0e0f0;
    --fg2: #8888aa;
    --accent: #6c63ff;
    --accent-g: linear-gradient(135deg, #6c63ff 0%, #a855f7 100%);
    --green: #34d399;
    --green-g: linear-gradient(135deg, #34d399 0%, #06b6d4 100%);
    --red: #f87171;
    --yellow: #fbbf24;
    --orange: #fb923c;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Ambient background ── */
  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, rgba(108,99,255,.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -10%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(52,211,153,.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 24px 28px 40px; }

  /* ── Header ── */
  .header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 28px; }
  .header h1 {
    font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
    background: var(--accent-g); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header .sub { font-size: 13px; color: var(--fg2); font-weight: 400; letter-spacing: 0.3px; }

  /* ── Cards ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; color: var(--fg2); margin-bottom: 14px; }

  /* ── Search bar ── */
  .search-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; font-weight: 500; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.8px; }
  .field input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--fg);
    padding: 10px 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,.15); }
  .field input::placeholder { color: var(--fg2); opacity: .5; }

  .btn {
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 600;
    border: none; border-radius: 7px;
    padding: 11px 22px;
    cursor: pointer;
    transition: transform .1s, opacity .2s, box-shadow .2s;
    display: inline-flex; align-items: center; gap: 7px;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--accent-g); color: #fff; box-shadow: 0 2px 12px rgba(108,99,255,.3); }
  .btn-primary:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(108,99,255,.45); }
  .btn-green { background: var(--green-g); color: #0c0c14; box-shadow: 0 2px 12px rgba(52,211,153,.25); }
  .btn-green:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(52,211,153,.4); }
  .btn-ghost { background: var(--surface); color: var(--fg); border: 1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { background: var(--bg3); }

  /* ── Filter bar ── */
  .filter-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .filter-info { font-size: 12px; color: var(--yellow); margin-left: 8px; }

  /* ── Status bar ── */
  .status-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 4px; }
  .progress-track { flex: 1; height: 4px; background: var(--surface); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: var(--accent-g); border-radius: 4px; transition: width .3s; }
  .progress-fill.indeterminate {
    width: 30%;
    animation: indeterminate 1.4s ease-in-out infinite;
  }
  @keyframes indeterminate {
    0% { margin-left: -30%; }
    100% { margin-left: 100%; }
  }
  .status-text { font-size: 12px; color: var(--yellow); white-space: nowrap; font-family: 'JetBrains Mono', monospace; font-size: 11px; }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: var(--surface);
    color: var(--accent);
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.8px;
    padding: 12px 14px;
    text-align: left;
    position: sticky; top: 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { background: var(--bg3); }
  thead th.sorted-asc::after { content: ' ▲'; font-size: 9px; }
  thead th.sorted-desc::after { content: ' ▼'; font-size: 9px; }
  tbody tr {
    border-bottom: 1px solid rgba(42,42,72,.5);
    transition: background .15s;
  }
  tbody tr:hover { background: var(--bg3); }
  tbody td { padding: 10px 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; white-space: nowrap; }
  td.domain-cell {
    color: var(--accent);
    cursor: pointer;
    font-weight: 500;
  }
  td.domain-cell:hover { text-decoration: underline; }
  td.num-cell { color: var(--fg2); text-align: center; width: 50px; }
  td.price-cell { text-align: center; color: var(--green); font-weight: 500; }
  td.date-cell { text-align: center; color: var(--fg); }
  td.years-cell { text-align: center; font-weight: 600; }
  td.years-cell.y10 { color: var(--green); }
  td.years-cell.y-other { color: var(--fg2); }
  td.registrar-cell { color: var(--fg2); max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
  td.error-cell { color: var(--red); }
  td.pending-cell { color: var(--fg2); opacity: .4; }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--fg2); font-size: 14px;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; display: block; opacity: .3; }

  /* ── Footer stats ── */
  .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .stats { font-size: 12px; color: var(--fg2); font-family: 'JetBrains Mono', monospace; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--fg); padding: 12px 20px;
    border-radius: 8px; font-size: 13px;
    box-shadow: var(--shadow);
    transform: translateY(120%); opacity: 0;
    transition: transform .3s, opacity .3s;
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .app { padding: 16px; }
    .header h1 { font-size: 22px; }
    .search-row { flex-direction: column; }
    .field { width: 100%; }
    .field input { width: 100%; }
    .btn { width: 100%; justify-content: center; }
  }

  /* ── Context menu ── */
  .ctx-menu {
    position: fixed; z-index: 1000;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 0;
    min-width: 180px; box-shadow: var(--shadow);
    display: none;
  }
  .ctx-menu.active { display: block; }
  .ctx-menu-item {
    padding: 9px 16px; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background .1s;
  }
  .ctx-menu-item:hover { background: var(--bg3); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg2); }

  /* ── Skeleton loading ── */
  .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--bg3) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>⚡ Domain Hunter</h1>
    <span class="sub">HugeDomains Scraper + WHOIS Lookup</span>
  </div>

  <!-- Search Card -->
  <div class="card">
    <div class="card-title">Search</div>
    <div class="search-row">
      <div class="field" style="flex:2;min-width:180px">
        <label>Keyword</label>
        <input type="text" id="keyword" placeholder="e.g. sport, tech, crypto" value="sport">
      </div>
      <div class="field" style="flex:0.7;min-width:100px">
        <label>Max Price $</label>
        <input type="text" id="priceMax" placeholder="495" value="495">
      </div>
      <div class="field" style="flex:0.5;min-width:80px">
        <label>Max Rows</label>
        <input type="text" id="maxRows" placeholder="100" value="100">
      </div>
      <button class="btn btn-primary" id="btnSearch" onclick="doSearch()">
        <span>🔍</span> Search &amp; Scrape
      </button>
      <button class="btn btn-green" id="btnWhois" onclick="doWhoisAll()">
        <span>🌐</span> WHOIS All
      </button>
      <button class="btn btn-ghost" onclick="exportCSV()">
        <span>💾</span> Export CSV
      </button>
    </div>
  </div>

  <!-- Filter Card -->
  <div class="card" style="padding: 12px 24px;">
    <div class="filter-row">
      <span style="font-size:11px;color:var(--fg2);text-transform:uppercase;letter-spacing:1px;font-weight:600;">Filter</span>
      <button class="btn btn-primary" style="padding:7px 16px;font-size:12px;" onclick="filter10y()">🎯 &gt; 10-Year</button>
      <button class="btn btn-ghost" style="padding:7px 16px;font-size:12px;" onclick="showAll()">📋 Show All</button>
      <span class="filter-info" id="filterInfo"></span>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="status-text" id="statusText">Ready — enter a keyword and hit Search</div>
  </div>

  <!-- Table -->
  <div class="table-wrap" style="max-height:60vh;overflow-y:auto;">
    <table>
      <thead>
        <tr>
          <th data-col="num" style="width:50px;text-align:center">#</th>
          <th data-col="domain">Domain</th>
          <th data-col="price" style="text-align:center">Price</th>
          <th data-col="created" style="text-align:center">Created</th>
          <th data-col="expires" style="text-align:center">Expires</th>
          <th data-col="years" style="text-align:center">Years</th>
          <th data-col="registrar">Registrar</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="7"><div class="empty-state"><span class="icon">🏹</span>Search for domains to get started</div></td></tr>
      </tbody>
    </table>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="stats" id="stats">0 domains loaded</div>
    <div class="stats" id="apiInfo" style="color:var(--fg2);font-size:11px;">API: /api/scrape · /api/whois</div>
  </div>
</div>

<!-- Context Menu -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-menu-item" onclick="ctxGoogle()">🔎 Search on Google</div>
  <div class="ctx-menu-item" onclick="ctxWhois()">🌐 WHOIS this domain</div>
  <div class="ctx-menu-item" onclick="ctxCopy()">📋 Copy domain</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── State ───
let allDomains = [];       // full data array
let visibleDomains = [];   // filtered view
let sortCol = null;
let sortDir = 'asc';
let ctxDomain = null;
let isSearching = false;
let isWhoisRunning = false;

const $ = id => document.getElementById(id);
const tbody = $('tbody');
const progressFill = $('progressFill');
const statusText = $('statusText');

// ─── Toast ───
function toast(msg, duration = 3000) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ─── Progress ───
function setProgress(pct) {
  progressFill.classList.remove('indeterminate');
  progressFill.style.width = pct + '%';
}
function setIndeterminate() {
  progressFill.classList.add('indeterminate');
  progressFill.style.width = '';
}
function setStatus(msg) { statusText.textContent = msg; }

// ─── Sorting ───
document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (!col || visibleDomains.length === 0) return;
    document.querySelectorAll('thead th').forEach(h => h.classList.remove('sorted-asc', 'sorted-desc'));
    if (sortCol === col) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortCol = col;
      sortDir = 'asc';
    }
    th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    sortAndRender();
  });
});

function sortAndRender() {
  if (!sortCol) { renderTable(visibleDomains); return; }
  const sorted = [...visibleDomains].sort((a, b) => {
    let va = a[sortCol] ?? '';
    let vb = b[sortCol] ?? '';
    if (sortCol === 'years' || sortCol === 'num') {
      va = parseFloat(va) || 0;
      vb = parseFloat(vb) || 0;
    } else if (sortCol === 'price') {
      va = parseFloat(String(va).replace(/[^0-9.]/g, '')) || 0;
      vb = parseFloat(String(vb).replace(/[^0-9.]/g, '')) || 0;
    } else {
      va = String(va).toLowerCase();
      vb = String(vb).toLowerCase();
    }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
  renderTable(sorted);
}

// ─── Render ───
function calcYears(row) {
  if (!row.created || !row.expires) return null;
  if (['—','N/A','Error',null,undefined,'null','None'].includes(row.created)) return null;
  if (['—','N/A','Error',null,undefined,'null','None'].includes(row.expires)) return null;
  try {
    const c = new Date(row.created);
    const e = new Date(row.expires);
    if (isNaN(c) || isNaN(e)) return null;
    return ((e - c) / (365.25 * 86400000)).toFixed(1);
  } catch { return null; }
}

function renderTable(list) {
  if (!list || list.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><span class="icon">🏹</span>No domains to display</div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map((r, i) => {
    const years = r.years ?? calcYears(r);
    const yClass = years !== null ? (parseFloat(years) > 10 ? 'y10' : 'y-other') : '';
    const isPending = !r.created || r.created === '—';
    const isError = r.created === 'Error';
    return `<tr data-domain="${esc(r.domain)}" oncontextmenu="showCtx(event, '${esc(r.domain)}')">
      <td class="num-cell">${r.num ?? i+1}</td>
      <td class="domain-cell" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(r.domain)}','_blank')">${esc(r.domain)}</td>
      <td class="price-cell">${r.price ? esc(r.price) : '—'}</td>
      <td class="${isError ? 'error-cell' : isPending ? 'pending-cell' : 'date-cell'}">${esc(r.created || '—')}</td>
      <td class="${isError ? 'error-cell' : isPending ? 'pending-cell' : 'date-cell'}">${esc(r.expires || '—')}</td>
      <td class="years-cell ${yClass}">${years !== null ? years : '—'}</td>
      <td class="registrar-cell">${esc(r.registrar || '—')}</td>
    </tr>`;
  }).join('');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

// ─── API Calls ───
async function doSearch() {
  if (isSearching) return;
  const keyword = $('keyword').value.trim();
  if (!keyword) { toast('Enter a keyword'); return; }

  isSearching = true;
  $('btnSearch').disabled = true;
  setIndeterminate();
  setStatus(`Scraping HugeDomains for "${keyword}"...`);

  try {
    const res = await fetch('/api/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        keyword,
        price_max: $('priceMax').value.trim() || '495',
        max_rows: parseInt($('maxRows').value) || 100,
      }),
    });
    let data;
    try { data = await res.json(); }
    catch { throw new Error(`Server error (HTTP ${res.status}) — response was not JSON. Check Vercel logs.`); }
    if (!res.ok) throw new Error(data.error || `Scrape failed (HTTP ${res.status})`);

    allDomains = (data.domains || []).map((d, i) => ({
      num: i + 1,
      domain: d.domain,
      price: d.price || '',
      created: null,
      expires: null,
      years: null,
      registrar: null,
    }));
    visibleDomains = [...allDomains];
    renderTable(visibleDomains);
    $('stats').textContent = `${allDomains.length} domains loaded`;
    setStatus(`Found ${allDomains.length} domains. Click "WHOIS All" to check dates.`);
    setProgress(100);
    $('filterInfo').textContent = '';
    toast(`${allDomains.length} domains found`);
  } catch (e) {
    setStatus(`Error: ${e.message}`);
    toast(`Error: ${e.message}`);
  } finally {
    isSearching = false;
    $('btnSearch').disabled = false;
    setTimeout(() => setProgress(0), 1500);
  }
}

async function doWhoisAll() {
  if (isWhoisRunning || allDomains.length === 0) {
    if (allDomains.length === 0) toast('Search for domains first');
    return;
  }

  isWhoisRunning = true;
  $('btnWhois').disabled = true;
  const total = allDomains.length;
  const BATCH = 5;  // process 5 at a time

  for (let i = 0; i < total; i += BATCH) {
    const batch = allDomains.slice(i, i + BATCH);
    const domainNames = batch.map(d => d.domain);

    setStatus(`WHOIS [${Math.min(i + BATCH, total)}/${total}] ...`);
    setProgress(((i + BATCH) / total) * 100);

    try {
      const res = await fetch('/api/whois', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ domains: domainNames }),
      });
      let data;
      try { data = await res.json(); }
      catch { throw new Error(`WHOIS server error (HTTP ${res.status}) — response was not JSON`); }
      if (data.results) {
        for (const d of batch) {
          const w = data.results[d.domain.toLowerCase()];
          if (w) {
            d.created = w.created || 'N/A';
            d.expires = w.expires || 'N/A';
            d.registrar = w.registrar || '';
            d.years = calcYears(d);
            if (w.error) {
              d.created = 'Error';
              d.expires = w.error.substring(0, 30);
            }
          }
        }
      }
    } catch (e) {
      for (const d of batch) {
        d.created = 'Error';
        d.expires = e.message.substring(0, 30);
      }
    }

    // Live-update table
    visibleDomains = applyCurrentFilter();
    sortCol ? sortAndRender() : renderTable(visibleDomains);
  }

  isWhoisRunning = false;
  $('btnWhois').disabled = false;
  setStatus('WHOIS lookup complete ✓');
  setProgress(100);
  toast('WHOIS lookup complete');
  setTimeout(() => setProgress(0), 2000);
}

async function whoisSingle(domain) {
  try {
    const res = await fetch('/api/whois', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain }),
    });
    const data = await res.json().catch(() => { throw new Error(`WHOIS server error (HTTP ${res.status})`); });
    if (data.results && data.results[domain.toLowerCase()]) {
      const w = data.results[domain.toLowerCase()];
      const row = allDomains.find(d => d.domain.toLowerCase() === domain.toLowerCase());
      if (row) {
        row.created = w.created || 'N/A';
        row.expires = w.expires || 'N/A';
        row.registrar = w.registrar || '';
        row.years = calcYears(row);
        if (w.error) { row.created = 'Error'; row.expires = w.error.substring(0, 30); }
        visibleDomains = applyCurrentFilter();
        sortCol ? sortAndRender() : renderTable(visibleDomains);
      }
    }
    toast(`WHOIS done: ${domain}`);
  } catch (e) {
    toast(`WHOIS error: ${e.message}`);
  }
}

// ─── Filters ───
let currentFilter = 'all';

function applyCurrentFilter() {
  if (currentFilter === '10y') {
    return allDomains.filter(r => {
      const y = parseFloat(calcYears(r));
      return !isNaN(y) && y > 10;
    });
  }
  return [...allDomains];
}

function filter10y() {
  if (allDomains.length === 0) { toast('Search for domains first'); return; }
  const hasWhois = allDomains.some(r => r.created && !['—', null].includes(r.created));
  if (!hasWhois) { toast('Run WHOIS first'); return; }
  currentFilter = '10y';
  visibleDomains = applyCurrentFilter();
  sortCol ? sortAndRender() : renderTable(visibleDomains);
  $('filterInfo').textContent = `🎯 Showing ${visibleDomains.length} of ${allDomains.length} — greater than 10-year registration`;
  $('stats').textContent = `${visibleDomains.length} domains (filtered)`;
}

function showAll() {
  currentFilter = 'all';
  visibleDomains = [...allDomains];
  sortCol ? sortAndRender() : renderTable(visibleDomains);
  $('filterInfo').textContent = '';
  $('stats').textContent = `${allDomains.length} domains loaded`;
}

// ─── CSV Export ───
function exportCSV() {
  const list = visibleDomains.length ? visibleDomains : allDomains;
  if (!list.length) { toast('No data to export'); return; }
  const headers = ['#', 'Domain', 'Price', 'Created', 'Expires', 'Years', 'Registrar'];
  const rows = list.map((r, i) => [
    r.num ?? i + 1,
    r.domain,
    r.price || '',
    r.created || '',
    r.expires || '',
    calcYears(r) ?? '',
    r.registrar || '',
  ]);
  let csv = headers.join(',') + '\n';
  for (const row of rows) {
    csv += row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',') + '\n';
  }
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `domains_${$('keyword').value.trim() || 'export'}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`Exported ${list.length} rows`);
}

// ─── Context Menu ───
function showCtx(e, domain) {
  e.preventDefault();
  ctxDomain = domain;
  const menu = $('ctxMenu');
  menu.style.top = e.clientY + 'px';
  menu.style.left = e.clientX + 'px';
  menu.classList.add('active');
}
document.addEventListener('click', () => $('ctxMenu').classList.remove('active'));

function ctxGoogle() {
  if (ctxDomain) window.open(`https://www.google.com/search?q=${encodeURIComponent(ctxDomain)}`, '_blank');
}
function ctxWhois() {
  if (ctxDomain) whoisSingle(ctxDomain);
}
function ctxCopy() {
  if (ctxDomain) {
    navigator.clipboard.writeText(ctxDomain).then(() => toast('Copied: ' + ctxDomain));
  }
}

// ─── Keyboard shortcut ───
$('keyword').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HugeDomains Sport Scraper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #00e5a0;
      --text: #e8e8e8;
      --muted: #666;
      --red: #ff4d4d;
      --red-dim: #ff4d4d18;
      --yellow: #f5c400;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      padding: 32px 24px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    .status-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .status-badge.running  { border-color: var(--yellow); color: var(--yellow); animation: pulse 1.2s infinite; }
    .status-badge.loaded   { border-color: var(--accent); color: var(--accent); }
    .status-badge.errored  { border-color: var(--red);    color: var(--red); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Error banners ── */
    .error-banner {
      display: none;
      background: var(--red-dim);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.82rem;
      color: var(--red);
    }
    .error-banner.visible { display: block; }
    .error-banner strong { font-weight: 600; display: block; margin-bottom: 4px; }

    .warn-banner {
      display: none;
      background: #f5c40012;
      border: 1px solid #f5c40040;
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 20px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      color: var(--yellow);
    }
    .warn-banner.visible { display: block; }
    .warn-banner details summary { cursor: pointer; }
    .warn-banner ul { margin-top: 8px; padding-left: 16px; line-height: 1.8; }
    .warn-banner li { color: #ccc; }
    .warn-banner li span { color: var(--red); margin-left: 8px; }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="text"], input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 14px;
      border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }
    input[type="text"] { width: 260px; }
    input[type="number"] { width: 110px; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 9px 18px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.97); }

    .btn-scrape { background: var(--accent); color: #000; }
    .btn-scrape:disabled { opacity: .4; cursor: not-allowed; }
    .btn-export { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-export:hover { border-color: var(--accent); color: var(--accent); }

    .meta { font-size: 0.78rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-left: auto; }

    /* ── Proxy section ── */
    .proxy-section {
      margin-bottom: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .proxy-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 8px;
    }
    .proxy-label span { color: var(--accent); }
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      padding: 10px 12px;
      border-radius: 6px;
      resize: vertical;
      min-height: 90px;
      outline: none;
      line-height: 1.6;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: #333; }
    .proxy-count { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 6px; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead tr { background: var(--surface); border-bottom: 1px solid var(--border); }

    th {
      text-align: left;
      padding: 12px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--accent); }
    th .sort-arrow { margin-left: 4px; opacity: .4; }
    th.active .sort-arrow { opacity: 1; color: var(--accent); }

    td { padding: 11px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface); }

    .domain-cell { font-family: 'IBM Plex Mono', monospace; font-weight: 600; color: var(--accent); }
    .domain-cell a { color: inherit; text-decoration: none; }
    .domain-cell a:hover { text-decoration: underline; }

    .price-cell { font-family: 'IBM Plex Mono', monospace; color: var(--yellow); }

    .date-cell { font-family: 'IBM Plex Mono', monospace; color: var(--muted); font-size: 0.82rem; }
    .date-cell.na { color: #333; }

    /* Error cell — shown when WHOIS failed for a specific domain */
    .error-cell {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      color: var(--red);
      background: var(--red-dim);
      border-radius: 4px;
      padding: 2px 8px;
      display: inline-block;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: default;
    }

    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; }

    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width .3s; border-radius: 2px; }
    .progress-fill.error-fill { background: var(--red); width: 100%; }
    .progress-fill.indeterminate { width: 40%; animation: slide 1.4s infinite ease-in-out; }
    @keyframes slide { 0%{ transform: translateX(-100%); } 100%{ transform: translateX(350%); } }
  </style>
</head>
<body>

<header>
  <div class="logo">huge<span>domains</span>.scraper</div>
  <div class="status-badge" id="statusBadge">idle</div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- Fatal scrape error banner -->
<div class="error-banner" id="fatalBanner">
  <strong>⛔ Scrape failed</strong>
  <span id="fatalMsg"></span>
</div>

<!-- Per-domain WHOIS error summary banner -->
<div class="warn-banner" id="warnBanner">
  <details>
    <summary id="warnSummary">⚠️  WHOIS errors</summary>
    <ul id="warnList"></ul>
  </details>
</div>

<div class="proxy-section">
  <div class="proxy-label">🔌 Proxy list <span>(optional)</span> — one per line: <code>IP:Port:User:Pass</code></div>
  <textarea id="proxyInput" placeholder="123.45.67.89:8080:user1:pass1&#10;98.76.54.32:3128:user2:pass2&#10;(leave empty to use direct connection)" oninput="updateProxyCount()"></textarea>
  <div class="proxy-count" id="proxyCount">0 proxies — using direct connection</div>
</div>

<div class="controls">
  <input type="text" id="searchInput" placeholder="Search domain…" oninput="applyFilters()" />
  <input type="number" id="minPrice" placeholder="Min $" oninput="applyFilters()" />
  <input type="number" id="maxPrice" placeholder="Max $" oninput="applyFilters()" />
  <button class="btn-scrape" id="scrapeBtn" onclick="triggerScrape()">▶ Run Scrape</button>
  <button class="btn-export" onclick="exportCSV()">↓ Export CSV</button>
  <div class="meta" id="metaInfo">No data loaded</div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('domain')">Domain <span class="sort-arrow" id="arrow-domain">↕</span></th>
        <th onclick="sortBy('price')">Price <span class="sort-arrow" id="arrow-price">↕</span></th>
        <th onclick="sortBy('created')">Created <span class="sort-arrow" id="arrow-created">↕</span></th>
        <th onclick="sortBy('expires')">Expires <span class="sort-arrow" id="arrow-expires">↕</span></th>
        <th>WHOIS Status</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="5" class="empty">Click "Run Scrape" to fetch domains.</td></tr>
    </tbody>
  </table>
</div>

<script>
  let allData = [];
  let sortCol = 'price';
  let sortAsc = true;
  let pollTimer = null;

  // ── Fetch & render ────────────────────────────────────────────────────────
  async function fetchDomains() {
    const search = document.getElementById('searchInput').value;
    const minPrice = document.getElementById('minPrice').value || 0;
    const maxPrice = document.getElementById('maxPrice').value || 99999;
    const params = new URLSearchParams({ search, min_price: minPrice, max_price: maxPrice });
    const res = await fetch(`/api/domains?${params}`);
    const json = await res.json();
    allData = json.data;
    updateStatus(json);
    renderErrors(json);
    renderTable(allData);
  }

  function applyFilters() { fetchDomains(); }

  // ── Sort ──────────────────────────────────────────────────────────────────
  function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '↕');
    document.querySelectorAll('th').forEach(el => el.classList.remove('active'));
    const arrow = document.getElementById(`arrow-${col}`);
    if (arrow) { arrow.textContent = sortAsc ? '↑' : '↓'; arrow.closest('th').classList.add('active'); }
    allData.sort((a, b) => {
      let av = a[col] || '', bv = b[col] || '';
      if (col === 'price') { av = parseInt(av.replace(/\D/g,'')||0); bv = parseInt(bv.replace(/\D/g,'')||0); }
      return sortAsc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
    });
    renderTable(allData);
  }

  // ── Render table ──────────────────────────────────────────────────────────
  function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty">No domains match your filters.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(d => {
      const hasError = d.error;
      const statusCell = hasError
        ? `<td><span class="error-cell" title="${escHtml(d.error)}">⛔ ${escHtml(d.error)}</span></td>`
        : `<td class="date-cell" style="color:#00e5a060">✓ ok</td>`;
      return `
        <tr>
          <td class="domain-cell"><a href="https://who.is/whois/${d.domain}" target="_blank">${d.domain}</a></td>
          <td class="price-cell">${d.price}</td>
          <td class="date-cell ${d.created === 'N/A' ? 'na' : ''}">${d.created}</td>
          <td class="date-cell ${d.expires === 'N/A' ? 'na' : ''}">${d.expires}</td>
          ${statusCell}
        </tr>`;
    }).join('');
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Error banners ─────────────────────────────────────────────────────────
  function renderErrors(json) {
    // Fatal error banner
    const fatalBanner = document.getElementById('fatalBanner');
    const fatalMsg    = document.getElementById('fatalMsg');
    if (json.fatal_error) {
      fatalMsg.textContent = json.fatal_error;
      fatalBanner.classList.add('visible');
    } else {
      fatalBanner.classList.remove('visible');
    }

    // Per-domain WHOIS error summary
    const warnBanner  = document.getElementById('warnBanner');
    const warnSummary = document.getElementById('warnSummary');
    const warnList    = document.getElementById('warnList');
    const errs = json.whois_errors || [];
    if (errs.length > 0) {
      warnSummary.textContent = `⚠️  ${errs.length} WHOIS error${errs.length > 1 ? 's' : ''} — click to expand`;
      warnList.innerHTML = errs.map(e =>
        `<li>${escHtml(e.domain)} <span>${escHtml(e.error)}</span></li>`
      ).join('');
      warnBanner.classList.add('visible');
    } else {
      warnBanner.classList.remove('visible');
    }
  }

  // ── Status badge + progress bar ───────────────────────────────────────────
  function updateStatus(json) {
    const badge = document.getElementById('statusBadge');
    const meta  = document.getElementById('metaInfo');
    const btn   = document.getElementById('scrapeBtn');
    const fill  = document.getElementById('progressFill');

    if (json.running) {
      badge.textContent = '● scraping…'; badge.className = 'status-badge running';
      fill.className = 'progress-fill indeterminate';
      btn.disabled = true;
    } else if (json.fatal_error) {
      badge.textContent = '⛔ error'; badge.className = 'status-badge errored';
      fill.className = 'progress-fill error-fill';
      btn.disabled = false;
      meta.textContent = 'Scrape failed';
    } else if (json.last_updated) {
      const errCount = (json.whois_errors || []).length;
      badge.textContent = errCount > 0 ? `✓ loaded (${errCount} err)` : '✓ loaded';
      badge.className = errCount > 0 ? 'status-badge errored' : 'status-badge loaded';
      fill.className = 'progress-fill'; fill.style.width = '100%';
      btn.disabled = false;
      meta.textContent = `${json.total} domains · updated ${json.last_updated}`;
    } else {
      badge.textContent = 'idle'; badge.className = 'status-badge';
      fill.className = 'progress-fill'; fill.style.width = '0';
      btn.disabled = false;
    }
  }

  // ── Proxy helpers ─────────────────────────────────────────────────────────
  function getProxies() {
    const raw = document.getElementById('proxyInput').value.trim();
    if (!raw) return [];
    return raw.split('\n').map(l => l.trim()).filter(Boolean);
  }

  function updateProxyCount() {
    const count = getProxies().length;
    document.getElementById('proxyCount').textContent =
      count === 0 ? '0 proxies — using direct connection'
                  : count + ' prox' + (count === 1 ? 'y' : 'ies') + ' loaded';
  }

  // ── Scrape trigger ────────────────────────────────────────────────────────
  async function triggerScrape() {
    // Clear old errors
    document.getElementById('fatalBanner').classList.remove('visible');
    document.getElementById('warnBanner').classList.remove('visible');

    const proxies = getProxies();
    await fetch('/api/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ proxy_list: proxies }),
    });
    startPolling();
  }

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      await fetchDomains();
      const res = await fetch('/api/status');
      const s = await res.json();
      if (!s.running) clearInterval(pollTimer);
    }, 3000);
  }

  // ── Export ────────────────────────────────────────────────────────────────
  function exportCSV() {
    const search = document.getElementById('searchInput').value;
    window.location.href = `/api/export?search=${encodeURIComponent(search)}`;
  }

  // Init
  fetchDomains();
</script>
</body>
</html>

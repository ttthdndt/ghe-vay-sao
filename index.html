<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HugeDomains Sport Scraper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #00e5a0;
      --text: #e8e8e8;
      --muted: #555;
      --yellow: #f5c400;
      --red: #ff5555;
      --blue: #7aa2f7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 28px 24px;
      gap: 20px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.3rem;
      font-weight: 600;
    }
    .logo span { color: var(--accent); }

    .status-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .status-badge.running { border-color: var(--yellow); color: var(--yellow); animation: blink 1s infinite; }
    .status-badge.done    { border-color: var(--accent); color: var(--accent); }
    @keyframes blink { 50% { opacity: .35; } }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    input, textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 13px;
      border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.83rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    input[type="text"]   { width: 240px; }
    input[type="number"] { width: 100px; }

    /* proxy box */
    .btn-proxy-toggle {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-proxy-toggle:hover { border-color: var(--accent); color: var(--accent); }

    #proxyPanel {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .proxy-panel { display: flex; flex-direction: column; }
    .proxy-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .proxy-hint { color: #383838; margin-left: 8px; text-transform: none; }
    .proxy-count { color: var(--accent); }
    #proxyInput {
      width: 100%;
      height: 90px;
      resize: vertical;
      line-height: 1.65;
      border: none;
      border-radius: 0;
      padding: 10px 14px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.84rem;
      font-weight: 600;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.97); }
    .btn-scrape { background: var(--accent); color: #000; }
    .btn-scrape:disabled { opacity: .35; cursor: not-allowed; }
    .btn-export {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-export:hover { border-color: var(--accent); color: var(--accent); }

    .meta {
      margin-left: auto;
      font-size: 0.76rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ── Main layout: table left, log right ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    /* ── Table ── */
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      height: 600px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86rem;
    }
    thead { position: sticky; top: 0; z-index: 1; }
    thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
    th {
      text-align: left;
      padding: 11px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    th:hover { color: var(--text); }
    th.active { color: var(--accent); }
    .arr { margin-left: 4px; opacity: .4; }
    th.active .arr { opacity: 1; }

    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--surface); }

    .domain-cell { font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
    .domain-cell a { color: var(--accent); text-decoration: none; }
    .domain-cell a:hover { text-decoration: underline; }
    .price-cell { font-family: 'IBM Plex Mono', monospace; color: var(--yellow); }
    .date-cell  { font-family: 'IBM Plex Mono', monospace; color: var(--muted); font-size: 0.81rem; }
    .date-na    { color: #2e2e2e; }

    .empty { text-align: center; padding: 60px; color: var(--muted);
             font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; }

    /* ── Log panel ── */
    .log-panel {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      height: 600px;
    }
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 0.72rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .log-clear {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.72rem;
      font-family: 'IBM Plex Mono', monospace;
      padding: 2px 6px;
    }
    .log-clear:hover { color: var(--red); }
    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.76rem;
      line-height: 1.65;
    }
    .log-line { white-space: pre-wrap; word-break: break-all; }
    .log-line.info   { color: #888; }
    .log-line.ok     { color: var(--accent); }
    .log-line.warn   { color: var(--yellow); }
    .log-line.error  { color: var(--red); }
    .log-line.done   { color: var(--blue); font-weight: 600; }

    /* custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }

    /* ── Proxy panel ── */
    .btn-proxy-toggle {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: 0.82rem;
    }
    .btn-proxy-toggle:hover { border-color: var(--blue); color: var(--blue); }

    .proxy-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .proxy-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .proxy-hint { color: #3a3a3a; text-transform: none; margin-left: 8px; }
    .proxy-count { color: var(--blue); }
    .proxy-textarea {
      width: 100%;
      height: 100px;
      background: var(--surface);
      border: none;
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      padding: 10px 14px;
      resize: vertical;
      outline: none;
      line-height: 1.7;
    }
    .proxy-textarea::placeholder { color: #2e2e2e; }

  </style>
</head>
<body>

<header>
  <div class="logo">huge<span>domains</span>.scraper</div>
  <div class="status-badge" id="statusBadge">idle</div>
</header>

<div class="controls">
  <input type="text"   id="searchInput"  placeholder="Search domain…"  oninput="applyFilters()" />
  <input type="number" id="minPrice"     placeholder="Min $"            oninput="applyFilters()" />
  <input type="number" id="maxPrice"     placeholder="Max $"            oninput="applyFilters()" />
  <button class="btn-scrape" id="scrapeBtn" onclick="triggerScrape()">▶ Run Scrape</button>
  <button class="btn-export" onclick="exportCSV()">↓ Export CSV</button>
  <button class="btn-proxy-toggle" onclick="toggleProxy()">⚙ Proxies</button>
  <div class="meta" id="metaInfo">No data loaded</div>
</div>

<!-- Proxy input panel -->
<div id="proxyPanel" style="display:none">
  <div class="proxy-panel">
    <div class="proxy-header">
      <span>Proxy List <span class="proxy-hint">one per line · format: IP:PORT:USER:PASS</span></span>
      <span id="proxyCount" class="proxy-count">0 proxies</span>
    </div>
    <textarea id="proxyInput" class="proxy-textarea"
      placeholder="45.145.57.219:10038:ERhzQv:FURf57&#10;45.145.57.219:10035:ERhzQv:FURf57&#10;45.145.57.219:10034:ERhzQv:FURf57"
      oninput="updateProxyCount()"
      spellcheck="false"></textarea>
  </div>
</div>

<div class="main">

  <!-- Domain table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('domain')">Domain <span class="arr" id="arr-domain">↕</span></th>
          <th onclick="sortBy('price')">Price <span class="arr" id="arr-price">↕</span></th>
          <th onclick="sortBy('created')">Created <span class="arr" id="arr-created">↕</span></th>
          <th onclick="sortBy('expires')">Expires <span class="arr" id="arr-expires">↕</span></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="4" class="empty">Click "Run Scrape" to fetch domains.</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Live log panel -->
  <div class="log-panel">
    <div class="log-header">
      <span>● Live Log</span>
      <button class="log-clear" onclick="clearLog()">clear</button>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>

</div>

<script>
  let allData = [];
  let sortCol = 'price';
  let sortAsc = true;
  let sseSource = null;
  let pollTimer = null;

  // ── Log ────────────────────────────────────────────────────────────────────
  function appendLog(line) {
    const el = document.getElementById('logBody');
    const div = document.createElement('div');
    div.className = 'log-line ' + logClass(line);
    div.textContent = line;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  function logClass(line) {
    if (line.includes('[Done]'))  return 'done';
    if (line.includes('✓'))       return 'ok';
    if (line.includes('✗') || line.includes('ERROR')) return 'error';
    if (line.includes('WHOIS'))   return 'info';
    return 'info';
  }

  function clearLog() {
    document.getElementById('logBody').innerHTML = '';
  }

  // ── SSE connection ─────────────────────────────────────────────────────────
  function connectSSE() {
    if (sseSource) sseSource.close();
    sseSource = new EventSource('/api/logs/stream');
    sseSource.onmessage = (e) => {
      if (e.data) appendLog(e.data);
    };
    sseSource.onerror = () => {
      // silently retry — browser reconnects automatically
    };
  }

  // ── Fetch domains ──────────────────────────────────────────────────────────
  async function fetchDomains() {
    const search   = document.getElementById('searchInput').value;
    const minPrice = document.getElementById('minPrice').value || 0;
    const maxPrice = document.getElementById('maxPrice').value || 99999;
    const params   = new URLSearchParams({ search, min_price: minPrice, max_price: maxPrice });
    const res  = await fetch(`/api/domains?${params}`);
    const json = await res.json();
    allData = json.data;
    updateStatus(json);
    renderTable(allData);
  }

  function applyFilters() { fetchDomains(); }

  // ── Status badge ───────────────────────────────────────────────────────────
  function updateStatus(json) {
    const badge = document.getElementById('statusBadge');
    const meta  = document.getElementById('metaInfo');
    const btn   = document.getElementById('scrapeBtn');

    if (json.running) {
      badge.textContent = '● scraping…';
      badge.className = 'status-badge running';
      btn.disabled = true;
    } else if (json.last_updated) {
      badge.textContent = '✓ done';
      badge.className = 'status-badge done';
      btn.disabled = false;
      meta.textContent = `${json.total} domains · ${json.last_updated}`;
    } else {
      badge.textContent = 'idle';
      badge.className = 'status-badge';
      btn.disabled = false;
    }
  }

  // ── Trigger scrape ─────────────────────────────────────────────────────────
  function getProxies() {
    const raw = document.getElementById('proxyInput').value.trim();
    if (!raw) return [];
    return raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  }

  function updateProxyCount() {
    const n = getProxies().length;
    document.getElementById('proxyCount').textContent = n + ' ' + (n === 1 ? 'proxy' : 'proxies');
  }

  function toggleProxy() {
    const panel = document.getElementById('proxyPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  }

  async function triggerScrape() {
    clearLog();
    const proxies = getProxies();
    await fetch('/api/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ proxies })
    });
    connectSSE();   // start listening for logs
    startPolling(); // poll domain results every 3s
  }

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      await fetchDomains();
      const s = await (await fetch('/api/status')).json();
      if (!s.running) {
        clearInterval(pollTimer);
        pollTimer = null;
        // close SSE after 3s grace period so last logs arrive
        setTimeout(() => { if (sseSource) sseSource.close(); }, 3000);
      }
    }, 3000);
  }

  // ── Table render ───────────────────────────────────────────────────────────
  function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="4" class="empty">No domains match your filters.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(d => `
      <tr>
        <td class="domain-cell"><a href="https://who.is/whois/${d.domain}" target="_blank">${d.domain}</a></td>
        <td class="price-cell">${d.price}</td>
        <td class="date-cell ${d.created === 'N/A' || d.created === 'Error' ? 'date-na' : ''}">${d.created}</td>
        <td class="date-cell ${d.expires === 'N/A' || d.expires === 'Error' ? 'date-na' : ''}">${d.expires}</td>
      </tr>`).join('');
  }

  // ── Sort ───────────────────────────────────────────────────────────────────
  function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }

    document.querySelectorAll('th').forEach(th => th.classList.remove('active'));
    document.querySelectorAll('.arr').forEach(a => a.textContent = '↕');
    const arr = document.getElementById(`arr-${col}`);
    if (arr) { arr.textContent = sortAsc ? '↑' : '↓'; arr.closest('th').classList.add('active'); }

    allData.sort((a, b) => {
      let av = a[col] || '', bv = b[col] || '';
      if (col === 'price') {
        av = parseInt(av.replace(/\D/g, '') || 0);
        bv = parseInt(bv.replace(/\D/g, '') || 0);
      }
      return sortAsc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
    });
    renderTable(allData);
  }

  // ── Export ─────────────────────────────────────────────────────────────────
  function exportCSV() {
    const search = document.getElementById('searchInput').value;
    window.location.href = `/api/export?search=${encodeURIComponent(search)}`;
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  fetchDomains();
  connectSSE();  // reconnect to existing log stream if scrape is already running
</script>
</body>
</html>

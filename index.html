<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain Hunter — HugeDomains Scraper + WHOIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg-deep: #0c0c1a;
  --bg: #111126;
  --bg-card: #181838;
  --bg-surface: #1e1e44;
  --bg-elevated: #262660;
  --border: #2a2a5e;
  --border-focus: #6366f1;
  --text: #e2e4f0;
  --text-dim: #8a8cb0;
  --text-muted: #5a5c80;
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,0.25);
  --green: #34d399;
  --green-glow: rgba(52,211,153,0.2);
  --amber: #fbbf24;
  --red: #f87171;
  --cyan: #22d3ee;
  --radius: 10px;
  --radius-sm: 6px;
}

html { font-size: 15px; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Animated background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 10%, rgba(99,102,241,0.08), transparent),
    radial-gradient(ellipse 500px 500px at 80% 80%, rgba(52,211,153,0.06), transparent);
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 24px 28px 60px; }

/* ── Header ── */
.header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.header h1 {
  font-size: 1.85rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #818cf8, #6366f1, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header .sub {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-weight: 400;
  letter-spacing: 0.02em;
}

/* ── Search controls ── */
.controls {
  display: flex;
  gap: 10px;
  align-items: end;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.field { display: flex; flex-direction: column; gap: 4px; }
.field label {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
}
.field input {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.88rem;
  padding: 9px 14px;
  background: var(--bg-surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.field-keyword { flex: 1; min-width: 180px; }
.field-small input { width: 90px; }

/* ── Buttons ── */
button {
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 12px var(--accent-glow);
}
.btn-primary:hover { background: #5558e6; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.4; pointer-events: none; }

.btn-green {
  background: var(--green);
  color: #0a0a1a;
  box-shadow: 0 2px 12px var(--green-glow);
}
.btn-green:hover { background: #2ec98e; }
.btn-green:disabled { opacity: 0.4; pointer-events: none; }

.btn-ghost {
  background: var(--bg-surface);
  color: var(--text-dim);
  border: 1.5px solid var(--border);
}
.btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

.btn-amber { background: var(--amber); color: #0a0a1a; }
.btn-amber:hover { background: #f0b420; }

/* ── Toolbar ── */
.toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.toolbar .spacer { flex: 1; }

/* ── Status bar ── */
.status-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  min-height: 28px;
}
.status-text {
  font-size: 0.8rem;
  color: var(--amber);
  font-weight: 500;
}
.progress-track {
  flex: 1;
  height: 4px;
  background: var(--bg-surface);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 2px;
  transition: width 0.3s ease;
}
.progress-fill.indeterminate {
  width: 30%;
  animation: indeterminate 1.4s ease-in-out infinite;
}
@keyframes indeterminate {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(400%); }
}

/* ── Table ── */
.table-wrap {
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg);
}
.table-scroll {
  overflow-x: auto;
  max-height: calc(100vh - 340px);
  overflow-y: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}
thead {
  position: sticky;
  top: 0;
  z-index: 2;
}
th {
  background: var(--bg-card);
  color: var(--accent);
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 12px 14px;
  text-align: left;
  border-bottom: 1.5px solid var(--border);
  user-select: none;
}
th.center, td.center { text-align: center; }
td {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(42,42,94,0.5);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  color: var(--text-dim);
  vertical-align: middle;
}
tr:hover td { background: rgba(99,102,241,0.04); }
td.domain-cell {
  color: var(--cyan);
  font-weight: 600;
  cursor: pointer;
  transition: color 0.15s;
}
td.domain-cell:hover { color: #5eeafd; text-decoration: underline; }
td.price-cell { color: var(--green); font-weight: 600; }
td.years-cell { font-weight: 600; }
td.years-cell.is-ten { color: var(--amber); }
td.error-cell { color: var(--red); }

.registrar-cell {
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 0.95rem;
}
.empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

/* ── Badge ── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
}
.badge-whois { background: rgba(99,102,241,0.15); color: var(--accent); }
.badge-pending { background: rgba(138,140,176,0.1); color: var(--text-muted); }
.badge-done { background: rgba(52,211,153,0.12); color: var(--green); }
.badge-error { background: rgba(248,113,113,0.12); color: var(--red); }

/* ── Footer ── */
.footer {
  margin-top: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.78rem;
  color: var(--text-muted);
}

/* ── Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  width: 90%;
  max-width: 720px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-header h3 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
}
.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.3rem;
  cursor: pointer;
  padding: 4px 8px;
}
.modal-close:hover { color: var(--text); }
.modal-body {
  padding: 16px 20px;
  overflow-y: auto;
  flex: 1;
}
.modal-body pre {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  color: var(--text-dim);
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.6;
}

/* ── Context menu ── */
.ctx-menu {
  position: fixed;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 0;
  min-width: 180px;
  z-index: 200;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  display: none;
}
.ctx-menu.open { display: block; }
.ctx-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: 8px 16px;
  font-size: 0.82rem;
  color: var(--text-dim);
  background: none;
  border: none;
  border-radius: 0;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
}
.ctx-item:hover { background: var(--bg-elevated); color: var(--text); }

/* ── Responsive ── */
@media (max-width: 700px) {
  .app { padding: 16px; }
  .controls { flex-direction: column; }
  .field-keyword { min-width: 100%; }
  .header h1 { font-size: 1.4rem; }
  .table-scroll { max-height: 60vh; }
}

/* ── Skeleton loading ── */
.skeleton {
  background: linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-elevated) 50%, var(--bg-surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 3px;
  display: inline-block;
  height: 1em;
  width: 80px;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>Domain Hunter</h1>
    <span class="sub">HugeDomains Scraper + WHOIS Lookup</span>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="field field-keyword">
      <label>Keyword</label>
      <input type="text" id="keyword" value="sport" placeholder="e.g. sport, crypto, ai"
             onkeydown="if(event.key==='Enter') doSearch()">
    </div>
    <div class="field field-small">
      <label>Max Price $</label>
      <input type="text" id="priceMax" value="495">
    </div>
    <div class="field field-small">
      <label>Max Rows</label>
      <input type="text" id="maxRows" value="100">
    </div>
    <button class="btn-primary" id="searchBtn" onclick="doSearch()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search
    </button>
    <button class="btn-green" id="whoisBtn" onclick="doWhoisAll()" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      WHOIS All
    </button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn-amber" onclick="filterTenYear()" id="filterBtn" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      10-Year Only
    </button>
    <button class="btn-ghost" onclick="showAll()" id="showAllBtn" disabled>Show All</button>
    <span class="spacer"></span>
    <button class="btn-ghost" onclick="exportCSV()" id="exportBtn" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export CSV
    </button>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <span class="status-text" id="statusText">Enter a keyword and click Search</span>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th class="center" style="width:50px">#</th>
            <th>Domain</th>
            <th class="center" style="width:100px">Price</th>
            <th class="center" style="width:115px">Created</th>
            <th class="center" style="width:115px">Expires</th>
            <th class="center" style="width:70px">Years</th>
            <th style="width:220px">Registrar</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7">
            <div class="empty-state">
              <div class="icon">🏹</div>
              Search for domains to get started
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="footer">
    <span id="statsText">0 domains loaded</span>
    <span id="filterInfo"></span>
  </div>
</div>

<!-- Raw WHOIS Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalTitle">Raw WHOIS</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <pre id="modalBody"></pre>
    </div>
  </div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctxMenu">
  <button class="ctx-item" onclick="ctxGoogle()">🔎 Search on Google</button>
  <button class="ctx-item" onclick="ctxWhois()">🌐 WHOIS this domain</button>
  <button class="ctx-item" onclick="ctxRawWhois()">📄 View Raw WHOIS</button>
  <button class="ctx-item" onclick="ctxCopy()">📋 Copy domain</button>
</div>

<script>
// ── State ──
let domains = [];       // full dataset
let filtered = null;    // null = show all
let running = false;
let ctxIdx = -1;

const $ = id => document.getElementById(id);
const tbody = $('tbody');

// ── Search ──
async function doSearch() {
  if (running) return;
  const keyword = $('keyword').value.trim();
  if (!keyword) return;

  running = true;
  $('searchBtn').disabled = true;
  setStatus('Scraping HugeDomains...', true);

  try {
    const resp = await fetch('/api/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        keyword,
        price_max: $('priceMax').value.trim() || '495',
        max_rows: parseInt($('maxRows').value) || 100,
      }),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    domains = data.domains.map((d, i) => ({
      num: i + 1,
      domain: d.domain,
      price: d.price || '',
      created: null,
      expires: null,
      years: null,
      registrar: null,
      raw: null,
      whoisDone: false,
      whoisError: null,
    }));
    filtered = null;
    renderTable();
    setStatus(`Found ${domains.length} domains. Click WHOIS All to check dates.`);
    $('whoisBtn').disabled = false;
    $('exportBtn').disabled = false;
  } catch (e) {
    setStatus('Error: ' + e.message);
  } finally {
    running = false;
    $('searchBtn').disabled = false;
    setProgress(0);
  }
}

// ── WHOIS All ──
async function doWhoisAll() {
  if (running || !domains.length) return;
  running = true;
  $('whoisBtn').disabled = true;
  $('filterBtn').disabled = true;

  const total = domains.length;
  for (let i = 0; i < total; i++) {
    if (!running) break;
    const row = domains[i];
    setStatus(`WHOIS [${i+1}/${total}]  ${row.domain}`);
    setProgress((i + 1) / total * 100);

    try {
      const resp = await fetch('/api/whois', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({domain: row.domain}),
      });
      const data = await resp.json();
      if (data.error) {
        row.whoisError = data.error;
      } else {
        row.created = data.created;
        row.expires = data.expires;
        row.years = data.years;
        row.registrar = data.registrar;
        row.raw = data.raw;
      }
      row.whoisDone = true;
    } catch (e) {
      row.whoisError = e.message;
      row.whoisDone = true;
    }
    updateRow(i);
  }

  running = false;
  $('whoisBtn').disabled = false;
  $('filterBtn').disabled = false;
  $('showAllBtn').disabled = false;
  setStatus('WHOIS lookup complete ✓');
  setProgress(100);
}

// ── Single WHOIS ──
async function doWhoisSingle(idx) {
  const row = domains[idx];
  setStatus(`WHOIS: ${row.domain}...`);
  try {
    const resp = await fetch('/api/whois', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({domain: row.domain}),
    });
    const data = await resp.json();
    if (data.error) {
      row.whoisError = data.error;
    } else {
      row.created = data.created;
      row.expires = data.expires;
      row.years = data.years;
      row.registrar = data.registrar;
      row.raw = data.raw;
    }
    row.whoisDone = true;
    updateRow(idx);
    setStatus('Done');
  } catch (e) {
    row.whoisError = e.message;
    row.whoisDone = true;
    updateRow(idx);
    setStatus('Error: ' + e.message);
  }
}

// ── Render ──
function getVisibleRows() {
  return filtered !== null ? filtered : domains;
}

function renderTable() {
  const rows = getVisibleRows();
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="icon">🏹</div>No domains found</div></td></tr>`;
    $('statsText').textContent = '0 domains';
    return;
  }
  tbody.innerHTML = rows.map((r, vi) => rowHTML(r, vi)).join('');
  $('statsText').textContent = `${rows.length} domains${filtered !== null ? ' (filtered)' : ''}`;
}

function rowHTML(r) {
  const created = r.whoisDone
    ? (r.whoisError ? `<span class="badge badge-error">Error</span>` : (r.created || '—'))
    : '—';
  const expires = r.whoisDone
    ? (r.whoisError ? '' : (r.expires || '—'))
    : '—';
  const yearsVal = r.years != null ? r.years.toFixed(1) : '—';
  const isTen = r.years != null && r.years >= 9.5 && r.years <= 10.5;
  const registrar = r.registrar || '—';

  return `<tr data-idx="${r.num - 1}" oncontextmenu="showCtx(event, ${r.num-1})">
    <td class="center">${r.num}</td>
    <td class="domain-cell" onclick="window.open('https://www.google.com/search?q='+encodeURIComponent('${r.domain}'),'_blank')">${r.domain}</td>
    <td class="center price-cell">${r.price ? '$' + r.price.replace('$','') : '—'}</td>
    <td class="center${r.whoisError ? ' error-cell' : ''}">${created}</td>
    <td class="center">${expires}</td>
    <td class="center years-cell${isTen ? ' is-ten' : ''}">${yearsVal}</td>
    <td class="registrar-cell" title="${escHTML(registrar)}">${escHTML(registrar)}</td>
  </tr>`;
}

function updateRow(idx) {
  const r = domains[idx];
  const rows = getVisibleRows();
  // Find this row's visible index
  const visIdx = rows.indexOf(r);
  if (visIdx === -1) return;
  const tr = tbody.children[visIdx];
  if (!tr) return;
  const tmp = document.createElement('tbody');
  tmp.innerHTML = rowHTML(r);
  tr.replaceWith(tmp.firstElementChild);
}

function escHTML(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Filter ──
function filterTenYear() {
  if (!domains.some(r => r.whoisDone)) {
    setStatus('Run WHOIS first');
    return;
  }
  filtered = domains.filter(r =>
    r.years != null && r.years >= 9.5 && r.years <= 10.5
  );
  renderTable();
  $('filterInfo').textContent = `🎯 ${filtered.length} of ${domains.length} — 10-year only`;
  $('showAllBtn').disabled = false;
}

function showAll() {
  filtered = null;
  renderTable();
  $('filterInfo').textContent = '';
}

// ── Export ──
async function exportCSV() {
  const rows = getVisibleRows();
  if (!rows.length) return;
  const csvRows = rows.map(r => ({
    num: r.num,
    domain: r.domain,
    price: r.price,
    created: r.created || '',
    expires: r.expires || '',
    years: r.years != null ? r.years.toFixed(1) : '',
    registrar: r.registrar || '',
  }));

  try {
    const resp = await fetch('/api/export', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({rows: csvRows}),
    });
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `domains_${$('keyword').value.trim() || 'export'}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    setStatus('CSV exported');
  } catch (e) {
    setStatus('Export error: ' + e.message);
  }
}

// ── Context menu ──
function showCtx(event, idx) {
  event.preventDefault();
  ctxIdx = idx;
  const menu = $('ctxMenu');
  menu.style.left = event.pageX + 'px';
  menu.style.top = event.pageY + 'px';
  menu.classList.add('open');
}

document.addEventListener('click', () => $('ctxMenu').classList.remove('open'));

function ctxGoogle() {
  if (ctxIdx < 0) return;
  window.open('https://www.google.com/search?q=' + encodeURIComponent(domains[ctxIdx].domain), '_blank');
}
function ctxWhois() {
  if (ctxIdx < 0) return;
  doWhoisSingle(ctxIdx);
}
function ctxRawWhois() {
  if (ctxIdx < 0) return;
  const r = domains[ctxIdx];
  if (r.raw) {
    openModal(`Raw WHOIS — ${r.domain}`, r.raw);
  } else {
    doWhoisSingle(ctxIdx).then(() => {
      if (domains[ctxIdx].raw) openModal(`Raw WHOIS — ${r.domain}`, domains[ctxIdx].raw);
    });
  }
}
function ctxCopy() {
  if (ctxIdx < 0) return;
  navigator.clipboard.writeText(domains[ctxIdx].domain);
  setStatus('Copied: ' + domains[ctxIdx].domain);
}

// ── Modal ──
function openModal(title, body) {
  $('modalTitle').textContent = title;
  $('modalBody').textContent = body;
  $('modalOverlay').classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== $('modalOverlay')) return;
  $('modalOverlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') $('modalOverlay').classList.remove('open'); });

// ── Helpers ──
function setStatus(msg, indeterminate) {
  $('statusText').textContent = msg;
  const fill = $('progressFill');
  if (indeterminate) {
    fill.classList.add('indeterminate');
    fill.style.width = '30%';
  } else {
    fill.classList.remove('indeterminate');
  }
}

function setProgress(pct) {
  const fill = $('progressFill');
  fill.classList.remove('indeterminate');
  fill.style.width = pct + '%';
}
</script>

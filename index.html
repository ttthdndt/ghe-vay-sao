<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HugeDomains Sport Scraper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #00e5a0;
      --accent-dim: #00e5a020;
      --text: #e8e8e8;
      --muted: #666;
      --red: #ff4d4d;
      --yellow: #f5c400;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      padding: 32px 24px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    .status-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .status-badge.running {
      border-color: var(--yellow);
      color: var(--yellow);
      animation: pulse 1.2s infinite;
    }
    .status-badge.loaded { border-color: var(--accent); color: var(--accent); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="text"], input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 14px;
      border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }
    input[type="text"] { width: 260px; }
    input[type="number"] { width: 110px; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 9px 18px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.97); }

    .btn-scrape {
      background: var(--accent);
      color: #000;
    }
    .btn-scrape:disabled { opacity: .4; cursor: not-allowed; }

    .btn-export {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-export:hover { border-color: var(--accent); color: var(--accent); }

    .meta {
      font-size: 0.78rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      margin-left: auto;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead tr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    th {
      text-align: left;
      padding: 12px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--accent); }
    th .sort-arrow { margin-left: 4px; opacity: .4; }
    th.active .sort-arrow { opacity: 1; color: var(--accent); }

    td {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface); }

    .domain-cell {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      color: var(--accent);
    }
    .domain-cell a {
      color: inherit;
      text-decoration: none;
    }
    .domain-cell a:hover { text-decoration: underline; }

    .price-cell {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--yellow);
    }

    .date-cell {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
      font-size: 0.82rem;
    }
    .date-cell.na { color: #333; }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
    }

    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width .3s;
      border-radius: 2px;
    }
    .progress-fill.indeterminate {
      width: 40%;
      animation: slide 1.4s infinite ease-in-out;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">huge<span>domains</span>.scraper</div>
  <div class="status-badge" id="statusBadge">idle</div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="controls">
  <input type="text" id="searchInput" placeholder="Search domain…" oninput="applyFilters()" />
  <input type="number" id="minPrice" placeholder="Min $" oninput="applyFilters()" />
  <input type="number" id="maxPrice" placeholder="Max $" oninput="applyFilters()" />
  <button class="btn-scrape" id="scrapeBtn" onclick="triggerScrape()">▶ Run Scrape</button>
  <button class="btn-export" onclick="exportCSV()">↓ Export CSV</button>
  <div class="meta" id="metaInfo">No data loaded</div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('domain')">Domain <span class="sort-arrow" id="arrow-domain">↕</span></th>
        <th onclick="sortBy('price')">Price <span class="sort-arrow" id="arrow-price">↕</span></th>
        <th onclick="sortBy('created')">Created <span class="sort-arrow" id="arrow-created">↕</span></th>
        <th onclick="sortBy('expires')">Expires <span class="sort-arrow" id="arrow-expires">↕</span></th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="4" class="empty">Click "Run Scrape" to fetch domains.</td></tr>
    </tbody>
  </table>
</div>

<script>
  let allData = [];
  let sortCol = 'price';
  let sortAsc = true;
  let pollTimer = null;

  // ── Fetch & render ────────────────────────────────────────────────────────
  async function fetchDomains() {
    const search = document.getElementById('searchInput').value;
    const minPrice = document.getElementById('minPrice').value || 0;
    const maxPrice = document.getElementById('maxPrice').value || 99999;
    const params = new URLSearchParams({ search, min_price: minPrice, max_price: maxPrice });
    const res = await fetch(`/api/domains?${params}`);
    const json = await res.json();
    allData = json.data;
    updateStatus(json);
    renderTable(allData);
  }

  function applyFilters() { fetchDomains(); }

  // ── Sort ──────────────────────────────────────────────────────────────────
  function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '↕');
    document.querySelectorAll('th').forEach(el => el.classList.remove('active'));
    const arrow = document.getElementById(`arrow-${col}`);
    if (arrow) { arrow.textContent = sortAsc ? '↑' : '↓'; arrow.closest('th').classList.add('active'); }

    allData.sort((a, b) => {
      let av = a[col] || '', bv = b[col] || '';
      if (col === 'price') { av = parseInt(av.replace(/\D/g,'')||0); bv = parseInt(bv.replace(/\D/g,'')||0); }
      return sortAsc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
    });
    renderTable(allData);
  }

  // ── Render table ──────────────────────────────────────────────────────────
  function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="4" class="empty">No domains match your filters.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(d => `
      <tr>
        <td class="domain-cell"><a href="https://who.is/whois/${d.domain}" target="_blank">${d.domain}</a></td>
        <td class="price-cell">${d.price}</td>
        <td class="date-cell ${d.created === 'N/A' ? 'na' : ''}">${d.created}</td>
        <td class="date-cell ${d.expires === 'N/A' ? 'na' : ''}">${d.expires}</td>
      </tr>`).join('');
  }

  // ── Status ────────────────────────────────────────────────────────────────
  function updateStatus(json) {
    const badge = document.getElementById('statusBadge');
    const meta = document.getElementById('metaInfo');
    const btn = document.getElementById('scrapeBtn');
    const fill = document.getElementById('progressFill');

    if (json.running) {
      badge.textContent = '● scraping…'; badge.className = 'status-badge running';
      fill.className = 'progress-fill indeterminate';
      btn.disabled = true;
    } else if (json.last_updated) {
      badge.textContent = '✓ loaded'; badge.className = 'status-badge loaded';
      fill.className = 'progress-fill'; fill.style.width = '100%';
      btn.disabled = false;
      meta.textContent = `${json.total} domains · updated ${json.last_updated}`;
    } else {
      badge.textContent = 'idle'; badge.className = 'status-badge';
      fill.className = 'progress-fill'; fill.style.width = '0';
      btn.disabled = false;
    }
  }

  // ── Scrape trigger ────────────────────────────────────────────────────────
  async function triggerScrape() {
    await fetch('/api/scrape', { method: 'POST' });
    startPolling();
  }

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      await fetchDomains();
      const res = await fetch('/api/status');
      const s = await res.json();
      if (!s.running) clearInterval(pollTimer);
    }, 3000);
  }

  // ── Export ────────────────────────────────────────────────────────────────
  function exportCSV() {
    const search = document.getElementById('searchInput').value;
    window.location.href = `/api/export?search=${encodeURIComponent(search)}`;
  }

  // Init
  fetchDomains();
</script>
</body>
</html>
